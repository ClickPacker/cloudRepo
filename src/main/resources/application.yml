spring:
  application:
    name: cloudRepo
  datasource:
    url: jdbc:postgresql://localhost:5432/cloud_repo
    username: postgres
    password: 1627
    driver-class-name: org.postgresql.Driver
  jpa:
    database: postgresql
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: localhost
      port: 6380
  session:
    timeout: 3000
    data:
      redis:
        namespace: spring:session
        flush-mode: on_save

  thymeleaf:
    cache: false
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  servlet:
    context-path: /api


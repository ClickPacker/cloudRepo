<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Настройки | CloudRepo</title>
    <link rel="icon" th:href="@{/assets/icon-BA2QZDzm.png}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/assets/index-BdL5i7zc.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:insert="~{navbar :: toolbar}"></div>

<main id="settings-app" class="container-fluid app-page px-3 px-md-4">
    <div class="asset-banner">
        <div class="d-flex align-items-center">
            <img th:src="@{/assets/icon-BA2QZDzm.png}" alt="CloudRepo">
            <div>
                <div class="page-title mb-0">Настройки аккаунта</div>
            </div>
        </div>
    </div>

    <div id="settings-status" class="alert d-none mb-3"></div>

    <div class="row g-3">
        <div class="col-12">
            <div class="card app-card h-100">
                <div class="card-header">Смена пароля</div>
                <div class="card-body">
                    <form id="change-password-form" class="row g-3">
                        <div class="col-12">
                            <label for="oldPassword" class="form-label">Старый пароль</label>
                            <input type="password" class="form-control" id="oldPassword" name="oldPassword" required>
                        </div>
                        <div class="col-12">
                            <label for="newPassword" class="form-label">Новый пароль</label>
                            <input type="password" class="form-control" id="newPassword" name="newPassword" minlength="8" maxlength="50" required>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-app text-white">Сменить пароль</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="card app-card">
                <div class="card-header">Сессия</div>
                <div class="card-body">
                    <form th:action="@{/auth/sign-out}" method="post" class="m-0">
                        <button type="submit" class="btn btn-outline-secondary">Выйти из аккаунта</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
